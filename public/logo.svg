<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Background -->
  <rect width="480" height="120" rx="12" fill="#1c2128"/>

  <!-- Orbit ring -->
  <ellipse cx="60" cy="60" rx="34" ry="14" stroke="#57ab5a" stroke-width="2.5" transform="rotate(-25 60 60)" opacity="0.7"/>
  <ellipse cx="60" cy="60" rx="34" ry="14" stroke="#f47067" stroke-width="2.5" transform="rotate(25 60 60)" opacity="0.7"/>

  <!-- Outer circle border -->
